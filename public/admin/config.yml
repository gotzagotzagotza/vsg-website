backend:
  name: github
  repo: virtualstudiogroups/vsg-website
  branch: main
  base_url: https://vsg-cms-auth.dragon277.workers.dev

media_folder: assets/images/uploads
public_folder: /assets/images/uploads

site_url: https://virtualstudiogroups.com

collections:
  - name: exhibitions
    label: "Magazine — Exhibitions & Encounters"
    folder: content/magazine/exhibitions
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD }
      - { label: Section, name: section, widget: hidden, default: "Exhibitions and Encounters" }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Cover image, name: cover, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: books
    label: "Magazine — Books & Ideas"
    folder: content/magazine/books-and-ideas
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Author, name: author, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD }
      - { label: Section, name: section, widget: hidden, default: "Books & Ideas" }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Body, name: body, widget: markdown }

  - name: projects_research
    label: "Magazine — Projects & Research"
    folder: content/magazine/projects-and-research
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD }
      - { label: Author, name: author, widget: string, required: false }
      - { label: Section, name: section, widget: hidden, default: "Projects & Research" }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Cover image, name: cover, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: reflections
    label: "Magazine — Reflections"
    folder: content/magazine/reflections
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD }
      - { label: Author, name: author, widget: string, required: false }
      - { label: Section, name: section, widget: hidden, default: "Reflections" }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: YouTube video URL, name: video, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: events
    label: Events
    files:
      - label: All Events
        name: events
        file: content/events.json
        fields:
          - label: Events
            name: events
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Venue, name: venue, widget: string }
              - { label: Location, name: location, widget: string }
              - { label: Start date, name: date_start, widget: datetime, format: YYYY-MM-DD }
              - { label: End date, name: date_end, widget: datetime, format: YYYY-MM-DD, required: false }
              - label: Status
                name: status
                widget: select
                options: [upcoming, past]
              - { label: Description, name: description, widget: text }
              - { label: Number of artists, name: artists_count, widget: number, required: false }
              - { label: Cover image, name: image, widget: image, required: false }
              - { label: Article link, name: article_link, widget: string, required: false }

  - name: artists
    label: Artists
    files:
      - label: All Artists
        name: artists
        file: content/artists.json
        fields:
          - label: Artists
            name: artists
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Country, name: country, widget: string }
              - { label: Instagram username, name: instagram, widget: string, required: false }
              - { label: Website (without https://), name: website, widget: string, required: false }
              - { label: Photo, name: photo, widget: image, required: false }
              - { label: Bio, name: bio, widget: text }

  - name: pages
    label: Pages
    files:
      - label: About
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: hidden, default: About }
          - { label: Body, name: body, widget: markdown }

      - label: Culture Code
        name: culture_code
        file: content/culture-code.md
        fields:
          - { label: Title, name: title, widget: hidden, default: "Culture Code" }
          - { label: Body, name: body, widget: markdown }
